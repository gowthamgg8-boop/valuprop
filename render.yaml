# valUProp.in — Render.com Deployment Config
# ─────────────────────────────────────────────────────────────────
# Deploys the backend API on Render's free tier.
# Frontend will be deployed separately as a Static Site.

services:

  # ── Backend API ─────────────────────────────────────────────────
  - type: web
    name: valuprop-api
    env: python
   
    region: singapore
    plan: free

    rootDir: backend

    buildCommand: |
      pip install -r requirements.txt
      python init_db.py

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: valuprop-db
          property: connectionString

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: LLM_PROVIDER
        value: anthropic

      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001

      - key: RAZORPAY_KEY_ID
        sync: false

      - key: RAZORPAY_KEY_SECRET
        sync: false

      - key: RESEND_API_KEY
        sync: false

      - key: FROM_EMAIL
        value: onboarding@resend.dev

      - key: FROM_NAME
        value: valUProp.in

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: DEV_MODE
        value: "false"

      - key: REPORT_PRICE_PAISE
        value: "9900"

    healthCheckPath: /api/health


# ── Database ────────────────────────────────────────────────────
databases:
  - name: valuprop-db
    plan: free
    region: singapore
    databaseName: valuprop
    user: valuprop_user
